<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timotheos Pantazis</title>
    <meta name="description" content="Timotheos Pantazis – Portfolio, GitHub, LinkedIn & more.">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
    :root {
        --bg:         #050009;
        --bg-card:    rgba(14, 4, 28, 0.72);
        --v1:         #5B21B6;
        --v2:         #7C3AED;
        --v3:         #8B5CF6;
        --v4:         #A78BFA;
        --v5:         #DDD6FE;
        --border:     rgba(139, 92, 246, 0.16);
        --border-h:   rgba(139, 92, 246, 0.45);
        --text:       #F5F3FF;
        --text-sub:   rgba(167, 139, 250, 0.75);
        --text-dim:   rgba(167, 139, 250, 0.35);
        --glow:       rgba(124, 58, 237, 0.28);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
        font-family: 'Figtree', sans-serif;
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 56px 20px 72px;
        position: relative;
        overflow-x: hidden;
        color: var(--text);
    }

    .bg {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
    }

    .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(110px);
    }

    .orb-1 {
        width: 55vw; height: 55vw; max-width: 520px; max-height: 520px;
        background: radial-gradient(circle, #4C1D95 0%, transparent 65%);
        top: -18%; left: -18%;
        opacity: 0.55;
        animation: driftA 22s ease-in-out infinite alternate;
    }

    .orb-2 {
        width: 45vw; height: 45vw; max-width: 420px; max-height: 420px;
        background: radial-gradient(circle, #6D28D9 0%, transparent 65%);
        bottom: -14%; right: -14%;
        opacity: 0.4;
        animation: driftB 28s ease-in-out infinite alternate;
    }

    .orb-3 {
        width: 30vw; height: 30vw; max-width: 300px; max-height: 300px;
        background: radial-gradient(circle, #7C3AED 0%, transparent 65%);
        top: 45%; left: 55%;
        transform: translate(-50%, -50%);
        opacity: 0.2;
        animation: driftC 18s ease-in-out infinite alternate;
    }

    @keyframes driftA { to { transform: translate(50px, 70px) scale(1.12); } }
    @keyframes driftB { to { transform: translate(-45px, -55px) scale(1.18); } }
    @keyframes driftC { to { transform: translate(-50%, -50%) scale(1.3); } }

    .grid-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        background-image:
            linear-gradient(rgba(139,92,246,0.04) 1px, transparent 1px),
            linear-gradient(90deg, rgba(139,92,246,0.04) 1px, transparent 1px);
        background-size: 52px 52px;
    }

    .grain {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 2;
        opacity: 0.028;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .accent-bar {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent 0%, var(--v2) 30%, var(--v4) 70%, transparent 100%);
        z-index: 100;
    }

    .wrap {
        position: relative;
        z-index: 3;
        width: 100%;
        max-width: 452px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(22px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .hero {
        text-align: center;
        padding: 8px 0 36px;
        animation: fadeUp 0.7s ease both;
    }

    .name {
        font-family: 'Unbounded', sans-serif;
        font-weight: 900;
        font-size: clamp(22px, 6vw, 29px);
        line-height: 1.18;
        letter-spacing: -0.5px;
        color: var(--text);
        margin-bottom: 3px;
        animation: fadeUp 0.7s 0.08s ease both;
    }

    .name-last {
        display: block;
        background: linear-gradient(120deg, var(--v5) 0%, var(--v4) 50%, var(--v3) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 18px;
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        padding: 24px 24px 22px;
        position: relative;
        overflow: hidden;
        animation: fadeUp 0.65s ease both;
    }

    .card::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 18px;
        background: linear-gradient(135deg, rgba(139,92,246,0.04) 0%, transparent 60%);
        pointer-events: none;
    }

    .links-list {
        display: flex;
        flex-direction: column;
        gap: 9px;
    }

    .lnk {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 15px 16px;
        background: rgba(91, 33, 182, 0.07);
        border: 1px solid var(--border);
        border-radius: 13px;
        text-decoration: none;
        color: var(--text);
        position: relative;
        overflow: hidden;
        transition: border-color 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
    }

    .lnk::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(105deg, rgba(91,33,182,0.22) 0%, rgba(139,92,246,0.08) 100%);
        opacity: 0;
        transition: opacity 0.22s ease;
    }

    .lnk:hover {
        border-color: var(--border-h);
        background: rgba(91, 33, 182, 0.15);
        box-shadow: 0 4px 26px rgba(91, 33, 182, 0.22);
    }

    .lnk:hover::before { opacity: 1; }

    .lnk-icon {
        width: 40px;
        height: 40px;
        border-radius: 11px;
        background: rgba(91, 33, 182, 0.18);
        border: 1px solid rgba(139, 92, 246, 0.22);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: background 0.22s, border-color 0.22s;
        position: relative;
        z-index: 1;
    }

    .lnk-icon i {
        font-size: 17px;
        color: var(--v4);
        transition: color 0.22s;
    }

    .lnk:hover .lnk-icon {
        background: rgba(91, 33, 182, 0.38);
        border-color: var(--v3);
    }

    .lnk:hover .lnk-icon i { color: var(--v5); }

    .lnk-text {
        flex: 1;
        position: relative;
        z-index: 1;
    }

    .lnk-title {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
    }

    .lnk-sub {
        display: block;
        font-size: 11px;
        font-weight: 400;
        color: var(--text-sub);
        margin-top: 2px;
    }

    .lnk-arrow {
        font-size: 12px;
        color: var(--text-dim);
        position: relative;
        z-index: 1;
        transition: color 0.22s, transform 0.22s;
    }

    .lnk:hover .lnk-arrow {
        color: var(--v4);
        transform: translateX(4px);
    }

    @media (max-width: 420px) {
        .name { font-size: 20px; }
    }
    </style>
</head>
<body>

    <div class="bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="grid-overlay"></div>
    <div class="grain"></div>
    <div class="accent-bar"></div>

    <div class="wrap">

        <!-- HERO -->
        <div class="hero">
            <div class="name">
                Τιμόθεος
                <span class="name-last">Πανταζής</span>
            </div>
        </div>

        <!-- LINKS -->
        <div class="card">
            <div class="links-list">

                <a href="https://tpantazhs.github.io/portfolio/" class="lnk" target="_blank" rel="noopener">
                    <div class="lnk-icon"><i class="fas fa-briefcase"></i></div>
                    <div class="lnk-text">
                        <span class="lnk-title">Project Portfolio</span>
                        <span class="lnk-sub">Projects & technical work</span>
                    </div>
                    <i class="fas fa-arrow-right lnk-arrow"></i>
                </a>

                <a href="https://www.linkedin.com/in/timotheospantazis-821451228/" class="lnk" target="_blank" rel="noopener">
                    <div class="lnk-icon"><i class="fab fa-linkedin"></i></div>
                    <div class="lnk-text">
                        <span class="lnk-title">LinkedIn</span>
                        <span class="lnk-sub">Career & professional network</span>
                    </div>
                    <i class="fas fa-arrow-right lnk-arrow"></i>
                </a>

                <a href="https://github.com/tpantazhs" class="lnk" target="_blank" rel="noopener">
                    <div class="lnk-icon"><i class="fab fa-github"></i></div>
                    <div class="lnk-text">
                        <span class="lnk-title">GitHub</span>
                        <span class="lnk-sub">Code, projects & repositories</span>
                    </div>
                    <i class="fas fa-arrow-right lnk-arrow"></i>
                </a>

                <a href="https://discord.com/" class="lnk" target="_blank" rel="noopener">
                    <div class="lnk-icon"><i class="fab fa-discord"></i></div>
                    <div class="lnk-text">
                        <span class="lnk-title">Discord</span>
                        <span class="lnk-sub">Message me directly</span>
                    </div>
                    <i class="fas fa-arrow-right lnk-arrow"></i>
                </a>

                <a href="https://www.instagram.com/" class="lnk" target="_blank" rel="noopener">
                    <div class="lnk-icon"><i class="fab fa-instagram"></i></div>
                    <div class="lnk-text">
                        <span class="lnk-title">Instagram</span>
                        <span class="lnk-sub">Personal & creative</span>
                    </div>
                    <i class="fas fa-arrow-right lnk-arrow"></i>
                </a>

            </div>
        </div>

    </div>
</body>
</html>
